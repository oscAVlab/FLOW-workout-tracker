<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOW — Workout Tracker</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0E0D11;
            --bg-secondary: #1a191f;
            --bg-tertiary: #24232b;
            --text-primary: #f5f5f5;
            --text-secondary: #b8b8b8;
            --accent: #c084fc;
            --success: #6ee659;
        }

        html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-title { font-size: 18px; font-weight: 700; color: var(--accent); }
        .sync-indicator { display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--text-secondary); }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bg-tertiary); transition: background 0.3s; }
        .sync-dot.ok { background: var(--success); }
        .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
        .sync-dot.error { background: #f87171; }

        .date-nav { display: flex; gap: 6px; align-items: center; }
        .date-btn { padding: 3px 8px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-secondary); border-radius: 3px; cursor: pointer; font-size: 9px; transition: all 0.2s; }
        .date-btn.today { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .current-date { color: var(--text-primary); font-weight: 600; font-size: 10px; min-width: 80px; text-align: center; }

        /* CALENDAR */
        .calendar-section { background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary); padding: 10px 16px; flex-shrink: 0; }
        .calendar-title { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
        .calendar-week { display: grid; grid-template-columns: repeat(7, minmax(40px, 40px)); gap: 4px; }
        .calendar-day { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--bg-tertiary); border-radius: 3px; background: var(--bg-tertiary); color: var(--text-secondary); font-size: 10px; cursor: pointer; transition: all 0.2s; position: relative; font-weight: 500; }
        .calendar-day.today { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }
        .calendar-day.completed::after { content: '✓'; position: absolute; top: -2px; right: 0px; font-size: 6px; color: var(--success); }

        /* MAIN */
        .main-content { display: grid; grid-template-columns: 1fr; gap: 12px; flex: 1; overflow: hidden; padding: 12px; }

        .stats-panel { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); border-radius: 4px; padding: 10px; }
        .stats-title { font-size: 9px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .stat-box { background: var(--bg-tertiary); padding: 6px; border-radius: 3px; text-align: center; }
        .stat-value { font-size: 16px; font-weight: 700; color: var(--accent); font-family: 'Courier New', monospace; }
        .stat-label { font-size: 7px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; }

        .center-panel { display: flex; flex-direction: column; gap: 8px; min-height: 0; overflow: hidden; }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-shrink: 0; }
        .timeline-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-primary); }
        .routine-selector { display: flex; gap: 4px; }
        .routine-btn { padding: 5px 10px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-secondary); border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: 700; transition: all 0.2s; }
        .routine-btn:hover { border-color: var(--accent); }
        .routine-btn.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

        .timeline-wrapper { flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); border-radius: 4px; overflow: hidden; min-height: 0; }
        .timeline-container { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }

        .timeline-block { background: var(--bg-tertiary); border: 1px solid var(--bg-primary); border-radius: 3px; padding: 10px; flex-shrink: 0; min-height: 80px; display: flex; flex-direction: column; }
        .timeline-block.completed { border-color: var(--success); opacity: 0.5; }
        .block-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
        .block-info { flex: 1; min-width: 0; }
        .block-title { font-size: 10px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; margin-bottom: 2px; }
        .block-exercises { font-size: 9px; color: var(--text-primary); line-height: 1.3; }
        .block-timer { text-align: right; flex-shrink: 0; }
        .timer-main { font-size: 14px; font-weight: 700; color: var(--accent); font-family: 'Courier New', monospace; }
        .timer-type { font-size: 7px; color: var(--text-secondary); }
        .progress-bar { width: 100%; height: 2px; background: var(--bg-primary); border-radius: 1px; overflow: hidden; margin: 4px 0; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
        .block-controls { display: flex; gap: 4px; margin-top: 2px; }
        .btn-mark { flex: 1; padding: 3px 4px; background: var(--bg-primary); border: 1px solid var(--accent); border-radius: 2px; color: var(--accent); font-size: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-mark:hover { background: var(--accent); color: var(--bg-primary); }

        /* FOOTER */
        .footer { background: var(--bg-secondary); border-top: 1px solid var(--bg-tertiary); padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .fasting-section { display: flex; align-items: center; gap: 12px; }
        .fasting-display { display: flex; flex-direction: column; gap: 1px; }
        .fasting-time { font-size: 16px; font-weight: 700; color: var(--success); font-family: 'Courier New', monospace; }
        .fasting-label { font-size: 8px; color: var(--text-secondary); text-transform: uppercase; }
        .fasting-stage { font-size: 9px; color: var(--accent); font-weight: 600; }
        .fasting-stages { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; flex: 1; }
        .stage { height: 16px; background: var(--bg-tertiary); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 6px; font-weight: 600; color: var(--text-secondary); position: relative; overflow: hidden; border: 1px solid var(--bg-primary); }
        .stage.active { color: var(--bg-primary); border-color: var(--accent); }
        .stage-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(192, 132, 252, 0.5); }
        .stage.active .stage-fill { background: var(--accent); }
        .fasting-controls { display: flex; gap: 4px; }
        .btn-small { padding: 2px 5px; background: var(--bg-tertiary); border: 1px solid var(--bg-primary); color: var(--text-secondary); border-radius: 2px; cursor: pointer; font-size: 7px; font-weight: 600; transition: all 0.2s; }
        .btn-small:hover { background: var(--accent); color: var(--bg-primary); }
        .footer-actions { display: flex; gap: 8px; }
        .btn-start { padding: 6px 12px; background: var(--accent); color: var(--bg-primary); border: none; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .btn-reset { padding: 6px 12px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-primary); border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: 600; text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .timer-active { animation: pulse 1s infinite; }
    </style>
</head>

    // ── SUPABASE SYNC ─────────────────────────────────────────
    async function loadFromSupabase() {
        setSyncStatus('syncing', 'cargando...');
        try {
            const { data, error } = await sb
                .from('flow_data')
                .select('*')
                .eq('id', 1);

            if (error) throw error;

            if (!data || data.length === 0) {
                // Fila no existe, la creamos
                const { error: insertError } = await sb
                    .from('flow_data')
                    .insert({ id: 1, workout_data: {}, fasting_state: {} });
                if (insertError) throw insertError;
                setSyncStatus('ok', 'listo');
                return;
            }

            const row = data[0];
            if (row.workout_data) workoutData = row.workout_data;
            if (row.fasting_state && Object.keys(row.fasting_state).length > 0) {
                const fs = row.fasting_state;
                fastingState.seconds   = fs.seconds   || 0;
                fastingState.offset    = fs.offset    || 0;
                fastingState.started   = fs.started   || false;
                fastingState.startedAt = fs.startedAt || null;
                // Si estaba corriendo, recalcular segundos transcurridos desde que se cerró
                if (fastingState.started && fastingState.startedAt) {
                    const elapsed = Math.floor((Date.now() - new Date(fastingState.startedAt).getTime()) / 1000);
                    fastingState.seconds += elapsed;
                    fastingState.startedAt = new Date().toISOString();
                }
            }
            setSyncStatus('ok', 'sync');
        } catch (e) {
            console.error('Load error:', e);
            setSyncStatus('error', 'sin conexión');
        }
    }

    async function saveToSupabase() {

                workout_data: workoutData,
                fasting_state: {
                    seconds:   fastingState.seconds,
                    offset:    fastingState.offset,
                    started:   fastingState.started,
                    startedAt: fastingState.startedAt
                },
                updated_at: new Date().toISOString()
            });
            if (error) throw error;
            setSyncStatus('ok', 'sync');
        } catch (e) {
            console.error('Save error:', e);
            setSyncStatus('error', 'sin sync');
        }
    }

    function debouncedSave() {
        clearTimeout(saveTimeout);

    // ── RENDER CALENDAR ───────────────────────────────────────

        const c = document.getElementById('calendar-week');

        const today = new Date();
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const ds = d.toISOString().split('T')[0];
            const dayNum = d.getDate();
            const isToday = d.toDateString() === today.toDateString();
            const btn = document.createElement('button');
            btn.className = 'calendar-day';
            btn.textContent = dayNum;
            if (isToday) btn.classList.add('today');
            if (workoutData[ds]) btn.classList.add('completed');
            btn.onclick = ((dateString) => () => {
                selectedDate = new Date(dateString + 'T12:00:00');
                updateDate(); renderCal(); updateStats();
            })(ds);
            c.appendChild(btn);
        }
    }

        Object.keys(routineData).forEach(id => {
            const btn = document.createElement('button');
            btn.className = 'routine-btn' + (parseInt(id) === currentRoutine ? ' active' : '');
            btn.textContent = 'D' + id;
            btn.onclick = () => { currentRoutine = parseInt(id); renderRoutine(); reset(); renderTL(); };
            r.appendChild(btn);
        });
    }

    // ── RENDER TIMELINE ───────────────────────────────────────
    function renderTL() {
        const t = document.getElementById('timeline-container');
        t.innerHTML = '';
        routineData[currentRoutine].blocks.forEach((b, i) => {
            const el = document.createElement('div');
            el.className = 'timeline-block';
            if (wstate.done.has(b.id)) el.classList.add('completed');
            const m = Math.floor(b.duration / 60), s = b.duration % 60;
            const ts = `${m}:${String(s).padStart(2, '0')}`;
            const icon = b.type === 'cardio' ? '🔥' : b.type === 'strength' ? '💪' : b.type === 'warmup' ? '↻' : '✓';
            el.innerHTML = `
                <div class="block-row">
                    <div class="block-info">
                        <div class="block-title">${b.title}</div>
                        <div class="block-exercises">${b.exercises}</div>
                    </div>
                    <div class="block-timer">
                        <div class="timer-main" id="tmr${i}">${ts}</div>
                        <div class="timer-type">${icon}</div>
                    </div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="prg${i}"></div></div>
                <div class="block-controls">
                    <button class="btn-mark" onclick="togDone(${i}, '${b.id}')">✓</button>
                </div>`;
            t.appendChild(el);
        });
    }

    // ── FECHA ─────────────────────────────────────────────────
    function updateDate() {
        document.getElementById('current-date').textContent =
            selectedDate.toLocaleDateString('es-ES', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    }

    // ── STATS ─────────────────────────────────────────────────
    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        let streak = 0, week = 0;
        for (let i = 0; i < 365; i++) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const ds = d.toISOString().split('T')[0];
            if (workoutData[ds]) {
                streak++;
            } else if (i > 0) break;
            if (i < 7 && workoutData[ds]) week++;
        }
        document.getElementById('stat-streak').textContent = streak;
        document.getElementById('stat-total').textContent  = Object.keys(workoutData).length;
        document.getElementById('stat-week').textContent   = week;
        document.getElementById('stat-today').textContent  = workoutData[today] ? `D${workoutData[today].r}` : '—';
    }

    // ── FASTING ───────────────────────────────────────────────
    function renderStages() {
        const st = document.getElementById('fasting-stages');
        st.innerHTML = '';
        fastingStages.forEach((s, i) => {
            const el = document.createElement('div');
            el.className = 'stage'; el.id = `stage-${i}`;
            el.innerHTML = `<div class="stage-fill"></div><div style="position:relative;z-index:1;font-size:6px">${s.name}</div>`;
            st.appendChild(el);
        });
    }

    function updateFasting() {
        const total = fastingState.seconds + (fastingState.offset * 3600);
        const h = Math.floor(total / 3600), m = Math.floor((total % 3600) / 60), s = total % 60;
        document.getElementById('fasting-time').textContent =
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

        let currentIdx = 0;
        for (let i = 0; i < fastingStages.length; i++) {
            if (h >= fastingStages[i].hours) currentIdx = i; else break;
        }
        document.getElementById('fasting-stage').textContent = fastingStages[currentIdx].name;

        fastingStages.forEach((stage, i) => {
            const el = document.getElementById(`stage-${i}`);
            if (!el) return;
            if (i < currentIdx) {
                el.classList.add('active');
                el.querySelector('.stage-fill').style.width = '100%';
            } else if (i === currentIdx) {
                el.classList.add('active');
                const nextH = fastingStages[i + 1]?.hours || 72;
                const pct = stage.hours === 0
                    ? Math.min((h / (nextH)) * 100, 100)
                    : Math.min(((h - stage.hours) / (nextH - stage.hours)) * 100, 100);
                el.querySelector('.stage-fill').style.width = pct + '%';
            } else {
                el.classList.remove('active');
                el.querySelector('.stage-fill').style.width = '0%';
            }
        });
    }

    function startFastingTimer() {
        if (fastingInterval) clearInterval(fastingInterval);
        fastingInterval = setInterval(() => {
            if (fastingState.started) {
                fastingState.seconds++;
                updateFasting();
            }
        }, 1000);
    }

    document.getElementById('btn-fasting-start').onclick = () => {
        fastingState.started = !fastingState.started;
        document.getElementById('btn-fasting-start').textContent = fastingState.started ? 'Pausar' : 'Ini';
        if (fastingState.started) {
            fastingState.startedAt = new Date().toISOString();
        }
        debouncedSave();
    };

    document.getElementById('btn-fasting-reset').onclick = () => {
        fastingState = { seconds: 0, offset: 0, started: false, startedAt: null };
        document.getElementById('btn-fasting-start').textContent = 'Ini';
        updateFasting();
        debouncedSave();
    };

    // ── WORKOUT CONTROLS ──────────────────────────────────────
    window.togDone = function(idx, id) {
        if (wstate.done.has(id)) wstate.done.delete(id); else wstate.done.add(id);
        // Si todos los bloques están hechos, guardar el workout del día
        const allDone = routineData[currentRoutine].blocks.every(b => wstate.done.has(b.id));
        if (allDone) {
            const today = new Date().toISOString().split('T')[0];
            workoutData[today] = { r: currentRoutine };
            updateStats(); renderCal();
            debouncedSave();
        }
        renderTL();
    };

    function toggleWk() {
        wstate.started = !wstate.started;
        document.getElementById('btn-start-workout').textContent = wstate.started ? 'PAUSAR' : 'INICIAR';
        if (wstate.started) startSeq(); else stopSeq();
    }

    function startSeq() {
        const rt = routineData[currentRoutine];
        let idx = 0;
        function next() {
            if (!wstate.started || idx >= rt.blocks.length) {
                wstate.started = false;
                document.getElementById('btn-start-workout').textContent = 'INICIAR';
                // Guardar workout completado
                const today = new Date().toISOString().split('T')[0];
                workoutData[today] = { r: currentRoutine };
                updateStats(); renderCal();
                debouncedSave();
                return;
            }
            const b = rt.blocks[idx];
            let rem = b.duration;
            const te = document.getElementById(`tmr${idx}`);
            const pe = document.getElementById(`prg${idx}`);
            if (te) te.classList.add('timer-active');
            const mn = Math.floor(rem / 60), sc = rem % 60;
            if (te) te.textContent = `${mn}:${String(sc).padStart(2,'0')}`;
            wint[idx] = setInterval(() => {
                rem--;
                const mn = Math.floor(rem / 60), sc = rem % 60;
                if (te) te.textContent = `${mn}:${String(sc).padStart(2,'0')}`;
                if (pe) pe.style.width = ((b.duration - rem) / b.duration * 100) + '%';
                if (rem <= 0) {
                    clearInterval(wint[idx]);
                    if (te) te.classList.remove('timer-active');
                    wstate.done.add(b.id);
                    renderTL();
                    idx++;
                    next();
                }
            }, 1000);
        }
        next();
    }

    function stopSeq() { Object.values(wint).forEach(i => clearInterval(i)); }

    function reset() {
        stopSeq();
        wstate.started = false;
        wstate.done = new Set();
        document.getElementById('btn-start-workout').textContent = 'INICIAR';
        renderTL();
    }

    document.getElementById('btn-start-workout').onclick = toggleWk;
    document.getElementById('btn-reset-workout').onclick = reset;
    document.getElementById('btn-prev-day').onclick = () => { selectedDate.setDate(selectedDate.getDate() - 1); updateDate(); renderCal(); updateStats(); };
    document.getElementById('btn-today').onclick = () => { selectedDate = new Date(); updateDate(); renderCal(); updateStats(); };
    document.getElementById('btn-next-day').onclick = () => { selectedDate.setDate(selectedDate.getDate() + 1); updateDate(); renderCal(); updateStats(); };

    // ── INIT ──────────────────────────────────────────────────
    async function init() {
        setSyncStatus('syncing', 'conectando...');
        await loadFromSupabase();
        updateDate();
        renderCal();
        renderRoutine();
        renderTL();
        updateStats();
        renderStages();
        updateFasting();
        startFastingTimer();
        // Actualizar botón ayuno si estaba corriendo
        if (fastingState.started) {
            document.getElementById('btn-fasting-start').textContent = 'Pausar';
        }
    }

    init();
</script>
</body>
</html>
