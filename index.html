                            const last = new Date(fastingState.startedAt).getTime();
                            const diff = Math.floor((now - last) / 1000);
                            fastingState.seconds += diff;
                            fastingState.startedAt = new Date().toISOString();
                            startFastingTimer();
                        }
                    }
                }
            } catch (e) { console.error("Load error:", e); }
            
            renderDaySelector();
            updateFastingUI();
            updateStats();
            changeDate(); // Initialize view for today
            setSyncStatus('cloud_done', false);
        }

        async function saveToSupabase() {
            setSyncStatus('sync', true);
            try {
                await sb.from('flow_data').upsert({ 
                    id: 1, 
                    workout_data: workoutDataStore, 
                    fasting_state: fastingState,
                    updated_at: new Date().toISOString()
                });
            } catch (e) { console.error("Save error:", e); }
            setSyncStatus('cloud_done', false);
        }

        function setSyncStatus(icon, isSyncing) {
            const el = document.getElementById('sync-status');
            if (icon === 'sync') el.textContent = 'cloud_sync';
            else el.textContent = icon;
            el.classList.toggle('animate-pulse', isSyncing);
        }

        function formatDateKey(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function renderDaySelector() {
            const container = document.getElementById('day-selector-container');
            container.innerHTML = '';
            const today = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const ds = formatDateKey(d);
                const isSelected = formatDateKey(selectedDate) === ds;
                
                const btn = document.createElement('button');
                btn.className = `w-12 h-16 flex flex-col items-center justify-center rounded-xl transition-all ${isSelected ? 'bg-primary/20 border border-primary/30 text-primary shadow-[0_0_15px_rgba(168,85,247,0.2)]' : 'bg-surface-container-high text-on-surface-variant hover:bg-surface-bright'}`;
                btn.innerHTML = `
                    <span class="text-[10px] font-label uppercase opacity-60">${days[d.getDay()]}</span>
                    <span class="text-lg font-bold">${d.getDate()}</span>
                `;
                btn.onclick = () => { 
                    selectedDate = d; 
                    renderDaySelector(); 
                    changeDate(); 
                };
                container.appendChild(btn);
            }
            document.getElementById('current-date-label').textContent = selectedDate.toDateString() === today.toDateString() ? 'Today' : selectedDate.toLocaleDateString();
        }

        function changeDate() {
            const ds = formatDateKey(selectedDate);
            const saved = workoutDataStore[ds] || {};
            currentRoutine = saved.routineId || 1;
            
            // Reset local session UI state
            sessionState.active = false;
            sessionState.paused = false;
            sessionState.totalElapsed = saved.duration || 0;
            sessionState.doneIds = new Set(saved.doneIds || []);
            
            clearInterval(globalTimerInterval);
            updateWorkoutTimerUI();
            updateRoutineUI();
            renderTimeline();
            updateStartBtnUI();
        }

        function updateRoutineUI() {
            document.querySelectorAll('.routine-btn').forEach(btn => {
                const rid = parseInt(btn.dataset.rid);
                if (rid === currentRoutine) {
                    btn.className = "routine-btn py-4 bg-primary/20 border border-primary/40 rounded-2xl text-primary font-label font-bold text-sm tracking-widest shadow-[0_0_20px_rgba(168,85,247,0.15)]";
                } else {
                    btn.className = "routine-btn py-4 bg-surface-container-high border border-outline-variant/10 rounded-2xl text-on-surface-variant font-label font-bold text-sm tracking-widest hover:bg-surface-bright transition-all";
                }
            });
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '<div class="absolute left-3 top-0 bottom-0 w-[1px] bg-outline-variant/20"></div>';
            
            routineData[currentRoutine].blocks.forEach((b, i) => {
                const isDone = sessionState.doneIds.has(b.id);
                const isActive = sessionState.blockIdx === i;
                
                const block = document.createElement('div');
                block.className = `relative flex items-center gap-6 pl-10 group transition-all duration-300 ${isDone ? 'opacity-40' : 'opacity-100'}`;
                block.innerHTML = `
                    <div class="absolute left-[9px] w-[7px] h-[7px] ${isDone ? 'bg-secondary shadow-[0_0_8px_#6ee659]' : (isActive ? 'bg-primary animate-ping' : 'bg-outline-variant')} rounded-full ring-4 ${isDone ? 'ring-secondary/20' : 'ring-surface-container-highest'}"></div>
                    <div class="flex-1 ${isActive ? 'bg-surface-bright border-primary/40' : 'bg-surface-container-high border-outline-variant/10'} p-4 rounded-2xl border-l-4 transition-colors">
                        <div class="flex justify-between items-center">
                            <span class="font-bold uppercase ${isActive ? 'text-primary' : ''}">${b.title}</span>
                            <span class="font-label text-xs opacity-60" id="block-timer-${i}">${formatMMSS(b.duration)}</span>
                        </div>
                        <p class="text-sm text-on-surface-variant mt-1 italic">${b.exercises}</p>
                    </div>`;
                container.appendChild(block);
            });
        }

        function formatMMSS(s) {
            const m = Math.floor(s / 60);
            const ss = s % 60;
            return `${m}M ${String(ss).padStart(2, '0')}S`;
        }

        function formatHHMMSS(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const ss = s % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }

        function updateFastingUI() {
            const total = Math.max(0, fastingState.seconds + (fastingState.offset * 3600));
            document.getElementById('fasting-time').textContent = formatHHMMSS(total);
            
            const hours = total / 3600;
            const pct = Math.min((hours / 24) * 100, 100);
            document.getElementById('fasting-fill').style.width = pct + '%';
            
            let stage = fastingStages[0];
            fastingStages.forEach(s => { if (hours >= s.hours) stage = s; });
            document.getElementById('fasting-stage-name').textContent = stage.name;
            
            const icon = document.querySelector('#btn-fasting-start span');
            icon.textContent = fastingState.started ? 'pause' : 'play_arrow';
            
            document.getElementById('offset-h').value = Math.floor(fastingState.offset);
            document.getElementById('offset-m').value = Math.round((fastingState.offset % 1) * 60);
        }

        function startFastingTimer() {
            if (fastingInterval) clearInterval(fastingInterval);
            fastingInterval = setInterval(() => {
                fastingState.seconds++;
                updateFastingUI();
            }, 1000);
        }

        function updateWorkoutTimerUI() {
            document.getElementById('workout-total-time').textContent = formatHHMMSS(sessionState.totalElapsed);
        }

        function updateStartBtnUI() {
            const label = document.getElementById('start-btn-label');
            const icon = document.getElementById('start-btn-icon');
            if (sessionState.active) {
                label.textContent = sessionState.paused ? 'RESUME WORKOUT' : 'SESSION ACTIVE';
                icon.textContent = sessionState.paused ? 'play_arrow' : 'bolt';
            } else {
                label.textContent = 'START WORKOUT';
                icon.textContent = 'play_arrow';
            }
        }

        // Fasting Controls
        document.getElementById('btn-fasting-start').onclick = () => {
            fastingState.started = !fastingState.started;
            if (fastingState.started) {
                fastingState.startedAt = new Date().toISOString();
                startFastingTimer();
            } else {
                clearInterval(fastingInterval);
                fastingState.startedAt = null;
            }
            updateFastingUI();
            saveToSupabase();
        };

        document.getElementById('btn-fasting-close').onclick = () => {
            const ds = formatDateKey(new Date());
            if (!workoutDataStore[ds]) workoutDataStore[ds] = {};
            workoutDataStore[ds].fastingLogged = fastingState.seconds + (fastingState.offset * 3600);
            saveToSupabase();
            alert('Fasting entry logged for today.');
        };

        document.getElementById('offset-h').onchange = (e) => { 
            const h = parseInt(e.target.value) || 0;
            const currentM = (fastingState.offset % 1);
            fastingState.offset = h + currentM;
            updateFastingUI();
            saveToSupabase();
        };

        document.getElementById('offset-m').onchange = (e) => { 
            const m = (parseInt(e.target.value) || 0) / 60;
            const currentH = Math.floor(fastingState.offset);
            fastingState.offset = currentH + m;
            updateFastingUI();
            saveToSupabase();
        };

        // Workout Controls
        document.getElementById('btn-start-workout').onclick = () => {
            if (sessionState.active && !sessionState.paused) return;
            
            if (!sessionState.active) {
                sessionState.active = true;
                sessionState.doneIds = new Set();
                sessionState.totalElapsed = 0;
                sessionState.blockIdx = 0;
                sessionState.currentBlockRemaining = routineData[currentRoutine].blocks[0].duration;
            }
            
            sessionState.paused = false;
            updateStartBtnUI();
            renderTimeline();
            startGlobalTimer();
        };

        document.getElementById('btn-pause-workout').onclick = () => {
            if (!sessionState.active) return;
            sessionState.paused = !sessionState.paused;
            if (sessionState.paused) clearInterval(globalTimerInterval);
            else startGlobalTimer();
            updateStartBtnUI();
        };

        document.getElementById('btn-reset-workout').onclick = () => {
            clearInterval(globalTimerInterval);
            sessionState.active = false;
            sessionState.paused = false;
            sessionState.blockIdx = -1;
            sessionState.totalElapsed = 0;
            sessionState.doneIds = new Set();
            updateWorkoutTimerUI();
            updateStartBtnUI();
            renderTimeline();
        };

        function startGlobalTimer() {
            clearInterval(globalTimerInterval);
            globalTimerInterval = setInterval(() => {
                sessionState.totalElapsed++;
                sessionState.currentBlockRemaining--;
                
                updateWorkoutTimerUI();
                
                // Update specific block timer
                const timerEl = document.getElementById(`block-timer-${sessionState.blockIdx}`);
                if (timerEl) {
                    timerEl.textContent = formatMMSS(sessionState.currentBlockRemaining);
                    timerEl.classList.add('timer-active', 'text-secondary');
                }

                if (sessionState.currentBlockRemaining <= 0) {
                    const finishedBlock = routineData[currentRoutine].blocks[sessionState.blockIdx];
                    sessionState.doneIds.add(finishedBlock.id);
                    sessionState.blockIdx++;
                    
                    if (sessionState.blockIdx < routineData[currentRoutine].blocks.length) {
                        sessionState.currentBlockRemaining = routineData[currentRoutine].blocks[sessionState.blockIdx].duration;
                        renderTimeline();
                    } else {
                        finishWorkout();
                    }
                }
            }, 1000);
        }

        function finishWorkout() {
            clearInterval(globalTimerInterval);
            sessionState.active = false;
            sessionState.paused = false;
            updateStartBtnUI();
            
            const ds = formatDateKey(selectedDate);
            workoutDataStore[ds] = { 
                routineId: currentRoutine, 
                doneIds: Array.from(sessionState.doneIds), 
                completed: true, 
                duration: sessionState.totalElapsed 
            };
            saveToSupabase();
            updateStats();
            alert('Session Blueprint Complete!');
        }

        document.getElementById('logWorkout').onclick = finishWorkout;

        document.querySelectorAll('.routine-btn').forEach(btn => {
            btn.onclick = () => {
                if (sessionState.active) {
                    if(!confirm("Change routine? Current progress will be lost.")) return;
                    document.getElementById('btn-reset-workout').click();
                }
                currentRoutine = parseInt(btn.dataset.rid);
                updateRoutineUI();
                renderTimeline();
            };
        });

        function updateStats() {
            const sessions = Object.values(workoutDataStore).filter(v => v.completed).length;
            document.getElementById('stat-total').textContent = sessions;
            
            let streak = 0;
            let checkDate = new Date();
            while (workoutDataStore[formatDateKey(checkDate)]?.completed) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            document.getElementById('stat-streak').textContent = streak;
        }

        // Navigation and Init
        document.querySelectorAll('.nav-item, #nav-dashboard, #nav-analytics').forEach(nav => {
            nav.onclick = (e) => {
                const view = nav.dataset.view || (nav.id === 'nav-dashboard' ? 'dashboard' : 'analytics');
                document.getElementById('dashboard-section').classList.toggle('hidden', view !== 'dashboard');
                document.getElementById('analytics-section').classList.toggle('hidden', view !== 'analytics');
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.replace('text-emerald-400', 'text-zinc-600'));
                if (nav.classList.contains('nav-item')) nav.classList.replace('text-zinc-600', 'text-emerald-400');
            };
        });

        loadFromSupabase();
    </script>
</body></html>
